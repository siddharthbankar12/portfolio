name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Debug - Check secret
        env:
          BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}
        run: |
          if [ -n "$BACKEND_URL" ]; then
            echo "REACT_APP_BACKEND_URL is set"
          else
            echo "REACT_APP_BACKEND_URL is NOT set"
          fi

      - name: Build production app
        run: |
          npm run build
          # Inject backend URL into the built HTML
          if [ -n "$REACT_APP_BACKEND_URL" ]; then
            sed -i "s|window.REACT_APP_CONFIG.BACKEND_URL = window.REACT_APP_CONFIG.BACKEND_URL || 'http://localhost:5001'|window.REACT_APP_CONFIG.BACKEND_URL = window.REACT_APP_CONFIG.BACKEND_URL || '$REACT_APP_BACKEND_URL'|g" ./build/index.html
          fi
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: ./build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: siddharthbankar12.github.io
